<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Gestor de Red</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container-main">
        <!-- Botón de regreso -->
        <div class="back-button-container">
            <a href="/" class="back-button">← Volver al inicio</a>
        </div>

        <!-- Sección de login -->
        <div class="login-container">
            <!-- Encabezado -->
            <div class="login-header">
                <h1>🔐 Iniciar Sesión</h1>
                <p>Accede a tu cuenta de Gestor de Red</p>
            </div>

            <!-- Formulario de login -->
            <form action="/login" method="POST" class="login-form">
                <!-- Username -->
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Introduce tu usuario"
                        required
                        autocomplete="username"
                    >
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Introduce tu contraseña"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <!-- Remember me -->
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember" value="true">
                    <label for="remember">Recuérdame en este dispositivo</label>
                </div>

                <!-- Error message (if any) -->
                <div id="error-message" class="alert alert-danger" style="display: none; margin-bottom: 20px;"></div>

                <!-- Submit button -->
                <button type="submit" class="btn-custom btn-login">Acceder</button>

                <!-- Additional links -->
                <div class="login-links">
                    <div class="link-group">
                        <a href="/forgot-password">¿Olvidaste tu contraseña?</a>
                    </div>
                    <div class="link-group">
                        <span>¿No tienes cuenta?</span>
                        <a href="/register">Solicita acceso aquí</a>
                    </div>
                </div>
            </form>

            <!-- Guest access option -->
            <div class="guest-alternative">
                <p>¿Prefieres explorar como invitado?</p>
                <a href="/guest" class="btn-guest-small">Acceso de Invitado</a>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>&copy; 2026 Gestor de Red Mininet. Todos los derechos reservados.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Handle error messages from server
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = error;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
