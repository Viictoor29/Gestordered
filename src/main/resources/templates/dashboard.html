<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Gestor de Red - ' + ${roleLabel}">Gestor de Red - Panel</title>
    <link rel="icon" type="image/png" href="/img/logo.png?v=20260526">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css?v=20260531-modular-dashboard">
    <script type="module" src="/js/network-dashboard.js?v=20260531-modular-dashboard" defer></script>
    <script type="module" src="/js/admin-topologies.js?v=20260529-draggable-topology" defer></script>
    <script type="module" src="/js/admin-live-inventory.js?v=20260531-physical-links" defer></script>
</head>
<body class="dashboard-page">
    <div class="dashboard-shell">
        <th:block th:replace="~{dashboard/fragments/sidebar :: sidebar}"></th:block>

        <main class="dashboard-main">
            <th:block th:replace="~{dashboard/fragments/topbar :: topbar}"></th:block>

            <th:block th:replace="~{dashboard/fragments/network :: network}"></th:block>

            <th:block th:replace="~{dashboard/fragments/profile :: profile}"></th:block>

            <th:block th:replace="~{dashboard/fragments/admin :: admin}"></th:block>

            <th:block th:replace="~{dashboard/fragments/topologies :: topologies}"></th:block>

            <th:block th:replace="~{dashboard/fragments/operators :: operators}"></th:block>
        </main>
    </div>

    <script src="/js/dashboard-ui.js?v=20260531-modular-dashboard"></script>
</body>
</html>
